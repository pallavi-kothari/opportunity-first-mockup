                <>
                  {convos.map(cv => {
                    const chColor = cv.channel === "email" ? "#3b82f6" : cv.channel === "sms" ? "#06b6d4" : "#22c55e";
                    const chLabel = cv.channel === "email" ? "Email" : cv.channel === "sms" ? "SMS" : "WhatsApp";
                    const isContact = cv.source === "contact";
                    return (
                      <div key={cv.id} style={{ padding: "14px 16px", borderRadius: 10, border: cv.unread ? "1px solid " + chColor + "44" : "1px solid #f1f5f9", marginBottom: 10, backgroundColor: cv.unread ? chColor + "06" : isContact ? "#fafbfc" : "#fff", cursor: "pointer", transition: "all 0.15s" }}
                        onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)"}
                        onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}
                      >
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                            {cv.channel === "email" ? Ic.mail(14, chColor) : Ic.sms(14, chColor)}
                            <span style={{ fontSize: 10, fontWeight: 700, color: chColor, textTransform: "uppercase", letterSpacing: 0.3 }}>{chLabel}</span>
                          </div>
                          <span style={{ fontSize: 11, color: "#94a3b8", marginLeft: "auto" }}>{cv.time}</span>
                          {cv.unread && <div style={{ width: 7, height: 7, borderRadius: "50%", backgroundColor: chColor, flexShrink: 0 }} />}
                        </div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", marginBottom: 3 }}>{cv.contact}{cv.subject ? ` — ${cv.subject}` : ""}</div>
                        <div style={{ fontSize: 12, color: "#64748b", lineHeight: 1.5 }}>{cv.lastMsg}</div>
                        <div style={{ marginTop: 8, display: "flex", alignItems: "center", gap: 6 }}>
                          <Badge color={chColor}>{chLabel}</Badge>
                          <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: isContact ? "#3b82f6" : "#8b5cf6", fontWeight: 600 }}>
                            <span style={{ width: 5, height: 5, borderRadius: "50%", backgroundColor: isContact ? "#3b82f6" : "#8b5cf6", display: "inline-block" }} />{isContact ? "contact" : "opp"}
                          </span>
                        </div>
                      </div>
                    );
                  })}
                  {convos.length === 0 && <Empty text={hideContact ? "No opp-specific conversations" : "No conversations linked"} />}
                </>
              );
              })()}
              {rp === "tasks" && (() => {
                const tasks = opp.tasks.filter(t => !hideContact || t.source !== "contact");
                return (
                <>
                  {tasks.map(t => (
                    <div key={t.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, opacity: t.done ? 0.5 : 1, backgroundColor: t.source === "contact" ? "#fafbfc" : "#fff" }}>
                      <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                        <div style={{ width: 18, height: 18, borderRadius: 5, border: t.done ? "none" : "2px solid #d1d5db", backgroundColor: t.done ? "#22c55e" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>{t.done && Ic.check(10, "#fff")}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", textDecoration: t.done ? "line-through" : "none", lineHeight: 1.3 }}>{t.title}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4, display: "flex", alignItems: "center", gap: 8 }}>
                            <span>Due {t.due}</span>
                            <Badge color={t.priority === "high" ? "#dc2626" : t.priority === "med" ? "#f59e0b" : "#22c55e"}>{t.priority}</Badge>
                            {t.source === "contact" && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: "#3b82f6", fontWeight: 600 }}><span style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#3b82f6", display: "inline-block" }} />{t.contact}</span>}
                          </div>
                        </div>
                      </div>
                    </div>
                  ))}
                  {tasks.length === 0 && <Empty text={hideContact ? "No opp-specific tasks" : "No tasks yet"} />}
                </>
              );
              })()}

              {rp === "notes" && (() => {
                const notes = opp.notes.filter(n => !hideContact || n.source !== "contact");
                return (
                <>
                  {notes.map(n => (
                    <div key={n.id} style={{ padding: "12px 14px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: n.source === "contact" ? "#fafbfc" : "#fff" }}>
                      <div style={{ fontSize: 13, color: "#334155", lineHeight: 1.5, marginBottom: 6 }}>{n.text}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8", display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{n.by} · {n.time}</span>
                        {n.source === "contact" && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: "#3b82f6", fontWeight: 600 }}><span style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#3b82f6", display: "inline-block" }} />{n.contact}</span>}
                      </div>
                    </div>
                  ))}
                  {notes.length === 0 && <Empty text={hideContact ? "No opp-specific notes" : "No notes yet"} />}
                </>
              );
              })()}

              {rp === "payments" && (() => {
                const docs = opp.docs.filter(d => !hideContact || d.source !== "contact");
                return (
                <>
                  {docs.map(d => (
                    <div key={d.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: d.source === "contact" ? "#fafbfc" : "#fff" }}>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                        <span style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{d.name}</span>
                        <Badge color={d.status === "Signed" ? "#22c55e" : d.status === "Viewed" ? "#3b82f6" : "#94a3b8"}>{d.status}</Badge>
                      </div>
                      <div style={{ fontSize: 11, color: "#94a3b8", display: "flex", alignItems: "center", gap: 6 }}>
                        <span>{d.type} · {d.to} · {d.date}</span>
                        {d.source === "contact" && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: "#3b82f6", fontWeight: 600 }}><span style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#3b82f6", display: "inline-block" }} />{d.contact}</span>}
                      </div>
                    </div>
                  ))}
                  {docs.length === 0 && <Empty text={hideContact ? "No opp-specific documents" : "No documents yet"} />}
                </>
              );
              })()}

              {rp === "appts" && (
                <>
                  {/* Opportunity-linked appointments */}
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Opportunity Appointments</div>
                    {opp.appts.map(a => (
                      <div key={a.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #dbeafe", marginBottom: 8, backgroundColor: "#fff" }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", marginBottom: 4 }}>{a.title}</div>
                        <div style={{ fontSize: 12, color: "#64748b" }}>{a.date}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>With: {a.with}</div>
                      </div>
                    ))}
                    {opp.appts.length === 0 && <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic", padding: "4px 0" }}>No appointments linked to this opportunity</div>}
                  </div>

                  {/* Contact-inherited appointments — hidden when filter active */}
                  {!hideContact && (opp.contactAppts || []).length > 0 && (
                    <div>
                      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                        <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5 }}>From Contacts</div>
                        <button onClick={() => setCollapsed(p => ({ ...p, contactAppts: !p.contactAppts }))} style={{ fontSize: 10, color: "#94a3b8", background: "none", border: "none", cursor: "pointer", fontWeight: 600 }}>
                          {collapsed.contactAppts ? "Show" : "Hide"}
                        </button>
                      </div>
                      {!collapsed.contactAppts && (opp.contactAppts || []).map(a => (
                        <div key={a.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: "#fafbfc", opacity: 0.75 }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                            <div style={{ fontSize: 13, fontWeight: 600, color: "#475569" }}>{a.title}</div>
                            <span style={{ fontSize: 9, fontWeight: 600, color: "#94a3b8", backgroundColor: "#f1f5f9", padding: "2px 6px", borderRadius: 3 }}>from {a.contact}</span>
                          </div>
                          <div style={{ fontSize: 12, color: "#64748b" }}>{a.date}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </>
              )}

              {rp === "products" && (
                <>
                  {opp.products.map((p, i) => (
                    <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: "#fff" }}>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{p.name}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8" }}>Qty: {p.qty}</div>
                      </div>
                      <span style={{ fontSize: 14, fontWeight: 700, color: "#1e293b" }}>{fmt(p.price)}</span>
                    </div>
                  ))}
                  {opp.products.length > 0 && (
                    <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 12px", borderTop: "2px solid #3b82f6", marginTop: 4 }}>
                      <span style={{ fontSize: 13, fontWeight: 800, color: "#1e293b" }}>Total</span>
                      <span style={{ fontSize: 15, fontWeight: 800, color: "#3b82f6" }}>{fmt(opp.products.reduce((s, p) => s + p.price * p.qty, 0))}</span>
                    </div>
                  )}
                  {opp.products.length === 0 && <Empty text="No products yet" />}
                </>
              )}

              {rp === "assoc" && (
                <>
                  {/* Company */}
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Company</div>
                    {opp.company ? (
                      <div style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", backgroundColor: "#fff", display: "flex", alignItems: "center", gap: 8 }}>
                        <div style={{ width: 32, height: 32, borderRadius: 6, backgroundColor: "#dbeafe", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{Ic.bldg(16, "#3b82f6")}</div>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{opp.company}</div>
                        </div>
                      </div>
                    ) : (
                      <button style={{ width: "100%", fontSize: 11, color: "#3b82f6", background: "none", border: "1px dashed #bfdbfe", borderRadius: 8, cursor: "pointer", fontWeight: 600, padding: "10px" }}>+ Link company</button>
                    )}
                  </div>

                  {/* Contacts */}
                  <div style={{ marginBottom: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                      <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5 }}>Contacts ({opp.participants.length})</div>
                      <button style={{ fontSize: 10, color: "#3b82f6", background: "none", border: "none", cursor: "pointer", fontWeight: 700 }}>+ Add</button>
                    </div>
                    {opp.participants.map((p, i) => (
                      <div key={i} style={{ padding: "10px 12px", borderRadius: 10, border: "1px solid #f1f5f9", backgroundColor: "#fff", marginBottom: 8 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: (p.contactTags || []).length > 0 ? 8 : 0 }}>
                          <Av text={p.name.split(" ").map(n => n[0]).join("")} size={30} color={p.primary ? "#3b82f6" : "#94a3b8"} />
                          <div style={{ flex: 1 }}>
                            <div style={{ fontSize: 12, fontWeight: 600, color: "#1e293b", display: "flex", alignItems: "center", gap: 4 }}>{p.name} {p.primary && <Badge color="#3b82f6">Primary</Badge>}</div>
                            <div style={{ fontSize: 11, color: "#94a3b8" }}>{p.role} · {p.email}</div>
                          </div>
                        </div>
                        {/* Contact Tags — editable */}
                        {((p.contactTags || []).length > 0 || true) && (
                          <div style={{ paddingLeft: 38 }}>
                            <div style={{ display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
                              {(p.contactTags || []).map((tag, ti) => (
                                <span key={ti} style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px", borderRadius: 99, fontSize: 10, fontWeight: 600, backgroundColor: "#ede9fe", color: "#7c3aed", lineHeight: "16px", cursor: "default" }}>
                                  {tag}
                                  <button style={{ background: "none", border: "none", padding: 0, cursor: "pointer", display: "flex", color: "#7c3aed", opacity: 0.5 }} title={`Remove "${tag}"`}>{Ic.x(10, "#7c3aed")}</button>
                                </span>
                              ))}
                              <button style={{ display: "inline-flex", alignItems: "center", gap: 2, padding: "2px 8px", borderRadius: 99, fontSize: 10, fontWeight: 600, backgroundColor: "#f8fafc", color: "#94a3b8", border: "1px dashed #e2e8f0", cursor: "pointer", lineHeight: "16px" }}>
                                {Ic.plus(9, "#94a3b8")} tag
                              </button>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                    {opp.participants.length === 0 && <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic" }}>No contacts linked</div>}
                  </div>

                  {/* Custom Objects */}
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Custom Objects</div>
                    <div style={{ padding: "16px 12px", borderRadius: 8, border: "1px dashed #e5e7eb", textAlign: "center" }}>
                      <div style={{ fontSize: 12, color: "#94a3b8", marginBottom: 6 }}>No custom objects linked</div>
                      <button style={{ fontSize: 11, color: "#3b82f6", background: "none", border: "none", cursor: "pointer", fontWeight: 600 }}>+ Link object</button>
                    </div>
                  </div>
                </>
              )}
            </div>
          </div>

          {/* Icon rail */}
          <div style={{ width: 44, backgroundColor: "#fafbfc", borderLeft: "1px solid #f1f5f9", display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 12, gap: 4 }}>
            {rpanels.map(p => <IcBtn key={p.id} icon={p.icon(17, rp === p.id ? "#3b82f6" : "#94a3b8")} active={rp === p.id} onClick={() => setRp(p.id)} title={p.tip} />)}
          </div>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// CONTACT PICKER — dropdown when multiple contacts
// ============================================================
const ContactPicker = ({ contacts, onSelect, onClose }) => (
  <div style={{ position: "absolute", top: "100%", right: 0, marginTop: 4, width: 260, backgroundColor: "#fff", borderRadius: 10, boxShadow: "0 8px 30px rgba(0,0,0,0.15)", border: "1px solid #e5e7eb", zIndex: 50, overflow: "hidden", animation: "fadeIn .12s ease" }}>
    <div style={{ padding: "10px 14px", borderBottom: "1px solid #f1f5f9" }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: "#1e293b" }}>Select contact</div>
    </div>
    {contacts.length > 0 ? contacts.map((c, i) => (
      <button key={i} onClick={() => onSelect(c)} style={{
        display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "10px 14px", border: "none", backgroundColor: "transparent", cursor: "pointer", borderBottom: i < contacts.length - 1 ? "1px solid #f8fafc" : "none",
      }}
        onMouseEnter={e => e.currentTarget.style.backgroundColor = "#f8fafc"}
        onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}
      >
        <Av text={c.name.split(" ").map(n => n[0]).join("")} size={28} color={c.primary ? "#3b82f6" : "#94a3b8"} />
        <div style={{ flex: 1, textAlign: "left" }}>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", display: "flex", alignItems: "center", gap: 4 }}>{c.name} {c.primary && <Badge color="#3b82f6">Primary</Badge>}</div>
          <div style={{ fontSize: 11, color: "#94a3b8" }}>{c.email}</div>
        </div>
      </button>
    )) : (
      <div style={{ padding: "16px 14px", textAlign: "center" }}>
        <div style={{ fontSize: 13, color: "#94a3b8", marginBottom: 8 }}>No contacts linked</div>
        <button style={{ fontSize: 12, fontWeight: 600, color: "#3b82f6", background: "none", border: "1px solid #bfdbfe", borderRadius: 6, padding: "6px 14px", cursor: "pointer" }}>+ Add contact first</button>
      </div>
    )}
    <div onClick={onClose} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: -1 }} />
  </div>
);

// ============================================================
// COMPOSER — slide-up panel for email, SMS, call log, appointment
// ============================================================
const Composer = ({ type, contact, onClose, oppName }) => {
  const [showLinkPopover, setShowLinkPopover] = useState(false);
  const [extraLinks, setExtraLinks] = useState([]);
  const titles = { email: "Send Email", sms: "Send SMS", call: "Log Call", appt: "Book Appointment", note: "Add Note" };
  const icons = { email: Ic.mail, sms: Ic.sms, call: Ic.phone, appt: Ic.cal, note: Ic.note };
  const TypeIcon = icons[type] || Ic.note;
  const colors = { email: "#3b82f6", sms: "#06b6d4", call: "#22c55e", appt: "#8b5cf6", note: "#f59e0b" };
  const color = colors[type] || "#64748b";

  return (
    <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, backgroundColor: "#fff", borderTop: "1px solid #e5e7eb", boxShadow: "0 -4px 20px rgba(0,0,0,0.08)", borderRadius: "12px 12px 0 0", zIndex: 20, animation: "slideUp .2s ease", display: "flex", flexDirection: "column", maxHeight: "55%" }}>
      <style>{`@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}`}</style>

      {/* Composer header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px", borderBottom: "1px solid #f1f5f9" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ width: 28, height: 28, borderRadius: 6, backgroundColor: color + "15", display: "flex", alignItems: "center", justifyContent: "center" }}>
            {TypeIcon(14, color)}
          </div>
          <div>
            <div style={{ fontSize: 14, fontWeight: 700, color: "#1e293b" }}>{titles[type]}</div>
            {contact && <div style={{ fontSize: 11, color: "#94a3b8" }}>to {contact.name} · {contact.email}</div>}
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
          <div style={{ padding: "3px 8px", borderRadius: 4, backgroundColor: "#f1f5f9", fontSize: 10, fontWeight: 600, color: "#64748b" }}>
            Linked to: {oppName}
          </div>
          <IcBtn icon={Ic.x(15)} onClick={onClose} title="Close" />
        </div>
      </div>

      {/* Composer body — varies by type */}
      <div style={{ flex: 1, padding: "16px 20px", overflowY: "auto" }}>
        {type === "note" && (
          <textarea placeholder="Write a note about this deal..." style={{ width: "100%", height: 100, border: "1px solid #e5e7eb", borderRadius: 8, padding: 12, fontSize: 13, color: "#334155", resize: "vertical", outline: "none", fontFamily: "inherit" }} />
        )}

        {type === "email" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, width: 50 }}>To:</span>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, backgroundColor: "#f8fafc", border: "1px solid #f1f5f9" }}>
                <Av text={contact?.name?.split(" ").map(n => n[0]).join("") || "?"} size={20} color="#3b82f6" />
                <span style={{ fontSize: 12, fontWeight: 600, color: "#1e293b" }}>{contact?.name}</span>
                <span style={{ fontSize: 11, color: "#94a3b8" }}>({contact?.email})</span>
              </div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, width: 50 }}>Subject:</span>
              <input placeholder="Email subject..." style={{ flex: 1, padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, outline: "none" }} />
            </div>
            <textarea placeholder="Write your email..." style={{ width: "100%", height: 120, border: "1px solid #e5e7eb", borderRadius: 8, padding: 12, fontSize: 13, color: "#334155", resize: "vertical", outline: "none", fontFamily: "inherit" }} />
          </div>
        )}

        {type === "sms" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, width: 50 }}>To:</span>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, backgroundColor: "#f8fafc", border: "1px solid #f1f5f9" }}>
                <Av text={contact?.name?.split(" ").map(n => n[0]).join("") || "?"} size={20} color="#06b6d4" />
                <span style={{ fontSize: 12, fontWeight: 600, color: "#1e293b" }}>{contact?.name}</span>
              </div>
            </div>
            <textarea placeholder="Type your message..." style={{ width: "100%", height: 60, border: "1px solid #e5e7eb", borderRadius: 8, padding: 12, fontSize: 13, color: "#334155", resize: "vertical", outline: "none", fontFamily: "inherit" }} maxLength={160} />
            <div style={{ fontSize: 11, color: "#94a3b8", textAlign: "right" }}>0/160 characters</div>
          </div>
        )}

        {type === "call" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, width: 70 }}>Called:</span>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, backgroundColor: "#f8fafc", border: "1px solid #f1f5f9" }}>
                <Av text={contact?.name?.split(" ").map(n => n[0]).join("") || "?"} size={20} color="#22c55e" />
                <span style={{ fontSize: 12, fontWeight: 600, color: "#1e293b" }}>{contact?.name}</span>
              </div>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 4 }}>Duration</div>
                <div style={{ display: "flex", gap: 6 }}>
                  <input placeholder="Min" type="number" style={{ width: 60, padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, outline: "none" }} />
                  <span style={{ fontSize: 12, color: "#94a3b8", alignSelf: "center" }}>min</span>
                </div>
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 4 }}>Outcome</div>
                <select style={{ width: "100%", padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, color: "#334155", backgroundColor: "#fff" }}>
                  <option>Connected</option><option>Left voicemail</option><option>No answer</option><option>Busy</option>
                </select>
              </div>
            </div>
            <textarea placeholder="Call notes..." style={{ width: "100%", height: 80, border: "1px solid #e5e7eb", borderRadius: 8, padding: 12, fontSize: 13, color: "#334155", resize: "vertical", outline: "none", fontFamily: "inherit" }} />
          </div>
        )}

        {type === "appt" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 600, width: 70 }}>With:</span>
              <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 6, padding: "6px 10px", borderRadius: 6, backgroundColor: "#f8fafc", border: "1px solid #f1f5f9" }}>
                <Av text={contact?.name?.split(" ").map(n => n[0]).join("") || "?"} size={20} color="#8b5cf6" />
                <span style={{ fontSize: 12, fontWeight: 600, color: "#1e293b" }}>{contact?.name}</span>
              </div>
            </div>
            <input placeholder="Appointment title..." style={{ padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, outline: "none" }} />
            <div style={{ display: "flex", gap: 10 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 4 }}>Date</div>
                <input type="date" style={{ width: "100%", padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, color: "#334155" }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 4 }}>Time</div>
                <input type="time" style={{ width: "100%", padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, color: "#334155" }} />
              </div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600, marginBottom: 4 }}>Duration</div>
                <select style={{ width: "100%", padding: "8px 10px", border: "1px solid #e5e7eb", borderRadius: 6, fontSize: 13, color: "#334155", backgroundColor: "#fff" }}>
                  <option>15 min</option><option>30 min</option><option>45 min</option><option>60 min</option>
                </select>
              </div>
            </div>
            <textarea placeholder="Notes..." style={{ width: "100%", height: 50, border: "1px solid #e5e7eb", borderRadius: 8, padding: 12, fontSize: 13, color: "#334155", resize: "vertical", outline: "none", fontFamily: "inherit" }} />
          </div>
        )}
      </div>

      {/* Linked records bar */}
      <div style={{ padding: "8px 20px", borderTop: "1px solid #f1f5f9", backgroundColor: "#fafbfc", position: "relative" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
          <span style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8" }}>Linked to:</span>
          {/* Current opportunity — always linked, non-removable */}
          <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, fontWeight: 600, padding: "3px 8px", borderRadius: 4, backgroundColor: "#ede9fe", color: "#7c3aed", border: "1px solid #ddd6fe" }}>
            {Ic.activity(9, "#7c3aed")} {oppName}
          </span>
          {/* Contact if selected */}
          {contact && (
            <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, fontWeight: 600, padding: "3px 8px", borderRadius: 4, backgroundColor: "#dbeafe", color: "#3b82f6", border: "1px solid #bfdbfe" }}>
              {Ic.users(9, "#3b82f6")} {contact.name}
              <button style={{ background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", marginLeft: 2 }}>{Ic.x(9, "#3b82f6")}</button>
            </span>
          )}
          {/* Extra linked records */}
          {extraLinks.map((l, i) => {
            const lc = { contact: "#3b82f6", opp: "#8b5cf6", company: "#f59e0b", custom: "#14b8a6" }[l.type] || "#94a3b8";
            const li2 = { contact: Ic.users, opp: Ic.activity, company: Ic.bldg, custom: Ic.link }[l.type] || Ic.link;
            return (
              <span key={i} style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, fontWeight: 600, padding: "3px 8px", borderRadius: 4, backgroundColor: lc + "10", color: lc, border: `1px solid ${lc}25` }}>
                {li2(9, lc)} {l.name}
                <button onClick={() => setExtraLinks(p => p.filter((_, j) => j !== i))} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, display: "flex", marginLeft: 2 }}>{Ic.x(9, lc)}</button>
              </span>
            );
          })}
          {/* Add more links */}
          <button onClick={() => setShowLinkPopover(p => !p)} style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, fontWeight: 600, padding: "3px 8px", borderRadius: 4, backgroundColor: showLinkPopover ? "#eff6ff" : "#fff", color: showLinkPopover ? "#3b82f6" : "#94a3b8", border: showLinkPopover ? "1px solid #bfdbfe" : "1px dashed #d1d5db", cursor: "pointer" }}>
            {Ic.plus(9, showLinkPopover ? "#3b82f6" : "#94a3b8")} Link record
          </button>
        </div>
        {/* Link popover */}
        {showLinkPopover && (
          <LinkRecordPopover
            existingLinks={[{ type: "opp", name: oppName }, ...(contact ? [{ type: "contact", name: contact.name }] : []), ...extraLinks]}
            onLink={r => { setExtraLinks(p => [...p, r]); setShowLinkPopover(false); }}
            onClose={() => setShowLinkPopover(false)}
          />
        )}
      </div>

      {/* Composer footer */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", padding: "10px 20px", borderTop: "1px solid #f1f5f9" }}>
        <div style={{ display: "flex", gap: 8 }}>
          <Btn onClick={onClose}>Cancel</Btn>
          <Btn primary>{type === "email" ? "Send Email" : type === "sms" ? "Send SMS" : type === "call" ? "Save Call Log" : type === "appt" ? "Book Appointment" : "Save Note"}</Btn>
        </div>
      </div>
    </div>
  );
};

// ============================================================
// LINK RECORD POPOVER — search & add associations to an activity
// ============================================================
const SAMPLE_RECORDS = [
  { type: "opp", name: "Acme SEO Retainer", sub: "Opportunity · $24,000 · Negotiation" },
  { type: "opp", name: "Acme Social Media", sub: "Opportunity · $8,000 · Proposal Sent" },
  { type: "opp", name: "BuildRight CRM Setup", sub: "Opportunity · $8,500 · Qualified" },
  { type: "contact", name: "John Smith", sub: "Contact · john@acme.com" },
  { type: "contact", name: "Sarah Chen", sub: "Contact · sarah@acme.com" },
  { type: "contact", name: "Diana Park", sub: "Contact · diana@summit.com" },
  { type: "contact", name: "Mike Torres", sub: "Contact · mike@buildright.com" },
  { type: "company", name: "Acme Corp", sub: "Company · 3 contacts · 2 opportunities" },
  { type: "company", name: "BuildRight LLC", sub: "Company · 1 contact · 1 opportunity" },
  { type: "custom", name: "Project: Acme Redesign", sub: "Projects · In Progress" },
  { type: "custom", name: "Contract: MSA-2026", sub: "Contracts · Active" },
  { type: "custom", name: "Ticket: #4521", sub: "Support Tickets · Open" },
];

const LinkRecordPopover = ({ onLink, onClose, existingLinks = [], position = "above" }) => {
  const [search, setSearch] = useState("");
  const [tab, setTab] = useState("all");
  const linkColors = { contact: "#3b82f6", opp: "#8b5cf6", company: "#f59e0b", custom: "#14b8a6" };
  const linkIcons = { contact: Ic.users, opp: Ic.activity, company: Ic.bldg, custom: Ic.link };
  const tabs = [
    { id: "all", label: "All" },
    { id: "opp", label: "Opportunities" },
    { id: "contact", label: "Contacts" },
    { id: "company", label: "Companies" },
    { id: "custom", label: "Custom Objects" },
  ];

  const existingNames = existingLinks.map(l => l.name);
  const filtered = SAMPLE_RECORDS
    .filter(r => tab === "all" || r.type === tab)
    .filter(r => !search || r.name.toLowerCase().includes(search.toLowerCase()) || r.sub.toLowerCase().includes(search.toLowerCase()));

  return (
    <div style={{ position: "absolute", ...(position === "above" ? { bottom: "100%", marginBottom: 6 } : { top: 0, marginTop: 0 }), left: 0, width: 360, backgroundColor: "#fff", borderRadius: 12, boxShadow: "0 12px 40px rgba(0,0,0,0.18)", border: "1px solid #e5e7eb", zIndex: 60, overflow: "hidden", animation: "fadeIn .12s ease", maxHeight: 420, display: "flex", flexDirection: "column" }}>
      {/* Header with search */}
      <div style={{ padding: "12px 14px 8px", borderBottom: "1px solid #f1f5f9" }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b", marginBottom: 8 }}>Link to record</div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 10px", borderRadius: 8, border: "1px solid #e5e7eb", backgroundColor: "#fafbfc" }}>
          {Ic.search(14, "#94a3b8")}
          <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Search records..." autoFocus style={{ flex: 1, border: "none", outline: "none", fontSize: 12, backgroundColor: "transparent", color: "#334155" }} />
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 2, padding: "6px 14px", borderBottom: "1px solid #f1f5f9", overflowX: "auto" }}>
        {tabs.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{
            padding: "3px 8px", borderRadius: 4, fontSize: 10, fontWeight: 600, border: "none", cursor: "pointer", whiteSpace: "nowrap",
            backgroundColor: tab === t.id ? "#3b82f6" : "transparent", color: tab === t.id ? "#fff" : "#64748b",
          }}>{t.label}</button>
        ))}
      </div>

      {/* Results */}
      <div style={{ flex: 1, overflowY: "auto", padding: "4px 0" }}>
        {filtered.map((r, i) => {
          const alreadyLinked = existingNames.includes(r.name);
          const color = linkColors[r.type] || "#94a3b8";
          const Icon = linkIcons[r.type] || Ic.link;
          return (
            <button key={i} onClick={() => !alreadyLinked && onLink(r)} disabled={alreadyLinked} style={{
              display: "flex", alignItems: "center", gap: 10, width: "100%", padding: "8px 14px", border: "none",
              backgroundColor: "transparent", cursor: alreadyLinked ? "default" : "pointer", opacity: alreadyLinked ? 0.5 : 1,
            }}
              onMouseEnter={e => { if (!alreadyLinked) e.currentTarget.style.backgroundColor = "#f8fafc"; }}
              onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}
            >
              <div style={{ width: 30, height: 30, borderRadius: 6, backgroundColor: color + "15", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                {Icon(14, color)}
              </div>
              <div style={{ flex: 1, textAlign: "left", minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#1e293b", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.name}</div>
                <div style={{ fontSize: 10, color: "#94a3b8" }}>{r.sub}</div>
              </div>
              {alreadyLinked && <span style={{ fontSize: 10, fontWeight: 600, color: "#94a3b8" }}>Linked</span>}
              {!alreadyLinked && <span style={{ fontSize: 10, fontWeight: 600, color: "#3b82f6" }}>+ Link</span>}
            </button>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ padding: "20px 14px", textAlign: "center", fontSize: 12, color: "#94a3b8" }}>
            No records found{search && ` for "${search}"`}
          </div>
        )}
      </div>

      {/* Close backdrop */}
      <div onClick={onClose} style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: -1 }} />
    </div>
  );
};

const Empty = ({ text }) => (
  <div style={{ textAlign: "center", padding: "36px 0" }}>
    <div style={{ fontSize: 13, color: "#94a3b8", fontWeight: 500 }}>{text}</div>
  </div>
);

// ============================================================
// APP
// ============================================================
const AppRoot = function App() {
  const [view, setView] = useState("board");
  const [sel, setSel] = useState(null);
  const [defaultClick, setDefaultClick] = useState("panel"); // "panel" or "full"

  const handleOppClick = (o) => {
    setSel(o);
    setView(defaultClick === "full" ? "full" : "panel");
  };

  return (
    <div style={{ height: "100vh", fontFamily: "Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif", color: "#0f172a", overflow: "hidden" }}>
      {/* Nav */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 24px", backgroundColor: "#0f172a" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 14, fontWeight: 800, color: "#fff", letterSpacing: -0.3 }}>GoHighLevel</span>
          <span style={{ color: "#334155", fontSize: 16 }}>/</span>
          <span style={{ fontSize: 12, color: "#94a3b8", fontWeight: 500 }}>Opportunities</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
          {/* Default click preference */}
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <span style={{ fontSize: 10, color: "#64748b", fontWeight: 600 }}>Click opens:</span>
            <div style={{ display: "flex", gap: 1, backgroundColor: "#1e293b", borderRadius: 5, padding: 1 }}>
              {[{ id: "panel", label: "Panel" }, { id: "full", label: "Full Page" }].map(o => (
                <button key={o.id} onClick={() => setDefaultClick(o.id)} style={{
                  padding: "2px 10px", borderRadius: 4, fontSize: 10, fontWeight: 600, border: "none",
                  backgroundColor: defaultClick === o.id ? "#3b82f6" : "transparent",
                  color: defaultClick === o.id ? "#fff" : "#64748b", cursor: "pointer",
                }}>{o.label}</button>
              ))}
            </div>
          </div>

          <div style={{ width: 1, height: 16, backgroundColor: "#334155" }} />

          <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "3px 10px", borderRadius: 6, backgroundColor: "#1e3a5f" }}>
            <div style={{ width: 6, height: 6, borderRadius: "50%", backgroundColor: "#34d399" }} />
            <span style={{ fontSize: 11, fontWeight: 600, color: "#93c5fd" }}>Opportunity-First Mode</span>
          </div>
        </div>
      </div>

      <div style={{ height: "calc(100vh - 36px)", position: "relative" }}>
        {view === "full" ? (
          <Workspace opp={sel} onBack={() => setView(defaultClick === "full" ? "board" : "panel")} />
        ) : (
          <>
            <Board onSelect={handleOppClick} selId={sel?.id} />
            {view === "panel" && sel && (
              <>
                <div onClick={() => { setSel(null); setView("board"); }} style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.05)", zIndex: 5 }} />
                <Panel opp={sel} onClose={() => { setSel(null); setView("board"); }} onExpand={() => setView("full")} />
              </>
            )}
          </>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<AppRoot />);
  </script>
</body>
</html>
