const Badge = ({ children, color = "#6366f1" }) => (
  <span style={{ display: "inline-flex", padding: "2px 8px", borderRadius: 99, fontSize: 10, fontWeight: 600, backgroundColor: color + "14", color, lineHeight: "16px", letterSpacing: 0.2 }}>{children}</span>

  <div style={{ width: size, height: size, borderRadius: "50%", backgroundColor: color + "15", color, display: "flex", alignItems: "center", justifyContent: "center", fontSize: Math.round(size * 0.36), fontWeight: 700, flexShrink: 0, letterSpacing: -0.5 }}>{text}</div>

  <button onClick={onClick} style={{ display: "inline-flex", alignItems: "center", gap: 5, padding: "6px 14px", fontSize: 12, fontWeight: 600, borderRadius: 8, border: primary ? "none" : "1px solid #e2e8f0", backgroundColor: primary ? "#3b82f6" : "#fff", color: primary ? "#fff" : "#475569", cursor: "pointer", transition: "all 0.15s", letterSpacing: 0.1, ...sx }}>{icon}{children}</button>
);

const IcBtn = ({ icon, active, onClick, title }) => (
  <button onClick={onClick} title={title} style={{ width: 34, height: 34, borderRadius: 8, border: "none", backgroundColor: active ? "#eff6ff" : "transparent", color: active ? "#3b82f6" : "#94a3b8", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", padding: 0, transition: "all 0.15s" }}
    onMouseEnter={e => { if (!active) e.currentTarget.style.backgroundColor = "#f1f5f9"; }}
    onMouseLeave={e => { if (!active) e.currentTarget.style.backgroundColor = "transparent"; }}
  >{icon}</button>
);

// CUSTOMIZE CARD PANEL
// ============================================================
const CustomizeCard = ({ onClose }) => {
  const [tab, setTab] = useState("fields");
  const [fieldGroups, setFieldGroups] = useState(CARD_FIELDS);
  const [actions, setActions] = useState(CARD_ACTIONS);

  const toggleField = (groupKey, fieldId) => {
    setFieldGroups(prev => ({
      ...prev,
      [groupKey]: {
        ...prev[groupKey],
        fields: prev[groupKey].fields.map(f => f.id === fieldId && !f.locked ? { ...f, on: !f.on } : f)
      }
    }));
  };

  const toggleAction = (actionId) => {
    setActions(prev => prev.map(a => a.id === actionId ? { ...a, on: !a.on } : a));
  };

  const totalFields = Object.values(fieldGroups).reduce((s, g) => s + g.fields.filter(f => f.on).length, 0);
  const totalAvailable = Object.values(fieldGroups).reduce((s, g) => s + g.fields.length, 0);

  return (
    <div style={{ position: "absolute", top: 0, right: 0, bottom: 0, width: 380, backgroundColor: "#fff", boxShadow: "-8px 0 30px rgba(0,0,0,0.1)", display: "flex", flexDirection: "column", zIndex: 20, animation: "si .2s ease" }}>

      {/* Header */}
      <div style={{ padding: "16px 20px", borderBottom: "1px solid #e5e7eb", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700, color: "#0f172a" }}>Customise Card</h3>
        <IcBtn icon={Ic.x(16)} onClick={onClose} title="Close" />
      </div>

      {/* Card Preview */}
      <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9" }}>
        <div style={{ fontSize: 11, fontWeight: 600, color: "#94a3b8", marginBottom: 8 }}>Card Preview</div>
        <div style={{ padding: 14, borderRadius: 10, border: "1px solid #e5e7eb", backgroundColor: "#fff", boxShadow: "0 1px 3px rgba(0,0,0,0.05)" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start", marginBottom: 6 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#1e293b" }}>Acme Corp Website Redesign</div>
            <Av text="PK" size={22} />
          </div>
          <div style={{ fontSize: 10, color: "#94a3b8", marginBottom: 4 }}>Stale</div>
          {/* Dynamic preview rows with source-colored left border */}
          {(() => {
            const previewData = {
              co_name: "Acme Corp", opp_source: "Referral", opp_value: "$15,000",
              opp_close: "May 15, 2026", opp_stage_age: "12 days", opp_products: "2",
              opp_lost: "Budget Constraints", ct_name: "John Smith", ct_email: "john@acme.com",
              ct_phone: "+1 555-0123", ct_task: "Apr 8", ct_engage: "85",
              ct_appt: "3 days", co_industry: "Technology", co_size: "50-200",
            };
            const rows = [];
            Object.entries(fieldGroups).forEach(([key, group]) => {
              group.fields.filter(f => f.on && !f.locked).forEach(f => {
                rows.push({ ...f, source: group.source, value: previewData[f.id] || "—" });
              });
            });
            return rows.map(r => {
              const st = SOURCE_TAGS[r.source];
              return (
                <div key={r.id} style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 2, paddingLeft: 8, borderLeft: `2px solid ${st?.color || "#94a3b8"}30` }}>
                  <span style={{ fontSize: 11, color: "#94a3b8", minWidth: 80, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{r.label.length > 14 ? r.label.slice(0, 14) + "..." : r.label}:</span>
                  <span style={{ fontSize: 11, fontWeight: 500, color: "#1e293b" }}>{r.value}</span>
                </div>
              );
            });
          })()}
          <div style={{ display: "flex", gap: 6, marginTop: 8, paddingTop: 8, borderTop: "1px solid #f1f5f9" }}>
            {actions.filter(a => a.on).map(a => (
              <div key={a.id} style={{ width: 22, height: 22, borderRadius: 4, backgroundColor: "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center" }}>
                {a.icon(12, "#94a3b8")}
              </div>
            ))}
          </div>
        </div>
        {/* Source legend */}
        <div style={{ display: "flex", gap: 10, marginTop: 8, justifyContent: "center" }}>
          {Object.entries(SOURCE_TAGS).map(([key, st]) => (
            <div key={key} style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <div style={{ width: 8, height: 8, borderRadius: 2, backgroundColor: st.color + "40" }} />
              <span style={{ fontSize: 10, color: "#94a3b8" }}>{st.label}</span>
            </div>
          ))}
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", borderBottom: "1px solid #e5e7eb" }}>
        <button onClick={() => setTab("fields")} style={{ flex: 1, padding: "10px 0", fontSize: 12, fontWeight: 700, border: "none", borderBottom: tab === "fields" ? "2px solid #3b82f6" : "2px solid transparent", backgroundColor: "transparent", color: tab === "fields" ? "#3b82f6" : "#94a3b8", cursor: "pointer" }}>
          Fields ({totalFields} out of {totalAvailable})
        </button>
        <button onClick={() => setTab("actions")} style={{ flex: 1, padding: "10px 0", fontSize: 12, fontWeight: 700, border: "none", borderBottom: tab === "actions" ? "2px solid #3b82f6" : "2px solid transparent", backgroundColor: "transparent", color: tab === "actions" ? "#3b82f6" : "#94a3b8", cursor: "pointer" }}>
          Quick actions
        </button>
      </div>

      {/* Content */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {tab === "fields" && (
          <div>
            {/* Migration banner */}
            <div style={{ margin: "12px 16px", padding: "10px 14px", borderRadius: 8, backgroundColor: "#eff6ff", border: "1px solid #bfdbfe", display: "flex", gap: 10, alignItems: "flex-start" }}>
              <div style={{ width: 20, height: 20, borderRadius: "50%", backgroundColor: "#3b82f6", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>
                <span style={{ color: "#fff", fontSize: 11, fontWeight: 800 }}>!</span>
              </div>
              <div>
                <div style={{ fontSize: 12, fontWeight: 700, color: "#1e40af", marginBottom: 2 }}>New opportunity fields available</div>
                <div style={{ fontSize: 11, color: "#3b82f6", lineHeight: 1.4 }}>Opportunity-first fields like Expected Close Date and Days in Stage are now available. Enable them below.</div>
              </div>
            </div>

            {/* Search */}
            <div style={{ padding: "0 16px 8px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "7px 10px", borderRadius: 8, border: "1px solid #e5e7eb" }}>
                {Ic.search(13, "#94a3b8")}
                <input placeholder="Search fields" style={{ flex: 1, border: "none", outline: "none", fontSize: 12, backgroundColor: "transparent" }} />
              </div>
            </div>

            {/* Field groups */}
            {Object.entries(fieldGroups).map(([key, group]) => (
              <div key={key} style={{ borderBottom: "1px solid #f1f5f9" }}>
                <div style={{ padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", backgroundColor: "#fafbfc" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#475569" }}>{group.label}</span>
                    {group.isNew && <span style={{ fontSize: 9, fontWeight: 700, color: "#3b82f6", backgroundColor: "#dbeafe", padding: "1px 6px", borderRadius: 3 }}>New</span>}
                  </div>
                  <span style={{ fontSize: 11, color: "#94a3b8" }}>{Ic.chevD(13, "#94a3b8")}</span>
                </div>
                <div style={{ padding: "4px 8px 8px" }}>
                  {group.fields.map(f => (
                    <div key={f.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 8px", borderRadius: 6, cursor: f.locked ? "default" : "pointer" }}
                      onClick={() => !f.locked && toggleField(key, f.id)}
                      onMouseEnter={e => { if (!f.locked) e.currentTarget.style.backgroundColor = "#f8fafc"; }}
                      onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}
                    >
                      {/* Drag handle */}
                      <div style={{ display: "flex", flexDirection: "column", gap: 2, cursor: "grab", opacity: 0.3 }}>
                        <div style={{ width: 8, display: "flex", gap: 2 }}><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /></div>
                        <div style={{ width: 8, display: "flex", gap: 2 }}><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /></div>
                      </div>
                      {/* Checkbox */}
                      <div style={{ width: 18, height: 18, borderRadius: 4, border: f.on ? "none" : "2px solid #d1d5db", backgroundColor: f.on ? "#3b82f6" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                        {f.on && Ic.check(11, "#fff")}
                      </div>
                      {/* Label + source tag */}
                      <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 5, flexWrap: "wrap" }}>
                        <span style={{ fontSize: 13, color: f.on ? "#1e293b" : "#94a3b8", fontWeight: 500 }}>{f.label}</span>
                        {f.isNew && <span style={{ fontSize: 9, fontWeight: 700, color: "#22c55e", backgroundColor: "#dcfce7", padding: "1px 5px", borderRadius: 3 }}>New</span>}
                      </div>
                      {/* Source tag + lock */}
                      <div style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                        {SOURCE_TAGS[group.source] && (
                          <span style={{ fontSize: 9, fontWeight: 600, color: SOURCE_TAGS[group.source].color, backgroundColor: SOURCE_TAGS[group.source].bg, padding: "1px 5px", borderRadius: 3 }}>
                            {SOURCE_TAGS[group.source].label}
                          </span>
                        )}
                        {f.locked && <span style={{ fontSize: 11, color: "#d1d5db" }}>🔒</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        )}

        {tab === "actions" && (
          <div style={{ padding: "12px 0" }}>
            <div style={{ padding: "0 16px 10px", display: "flex", alignItems: "center", gap: 6 }}>
              <div style={{ width: 16, height: 16, borderRadius: "50%", backgroundColor: "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center" }}>
                <span style={{ fontSize: 9, color: "#94a3b8" }}>i</span>
              </div>
              <span style={{ fontSize: 11, color: "#94a3b8", lineHeight: 1.4 }}>Count for each action will be shown in the card wherever applicable.</span>
            </div>
            {actions.map(a => (
              <div key={a.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 16px", cursor: "pointer" }}
                onClick={() => toggleAction(a.id)}
                onMouseEnter={e => e.currentTarget.style.backgroundColor = "#f8fafc"}
                onMouseLeave={e => e.currentTarget.style.backgroundColor = "transparent"}
              >
                {/* Drag handle */}
                <div style={{ display: "flex", flexDirection: "column", gap: 2, cursor: "grab", opacity: 0.3 }}>
                  <div style={{ width: 8, display: "flex", gap: 2 }}><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /></div>
                  <div style={{ width: 8, display: "flex", gap: 2 }}><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /><div style={{ width: 3, height: 3, borderRadius: 1, backgroundColor: "#94a3b8" }} /></div>
                </div>
                {/* Checkbox */}
                <div style={{ width: 18, height: 18, borderRadius: 4, border: a.on ? "none" : "2px solid #d1d5db", backgroundColor: a.on ? "#3b82f6" : "#fff", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {a.on && Ic.check(11, "#fff")}
                </div>
                {/* Label + source tag */}
                <div style={{ flex: 1, display: "flex", alignItems: "center", gap: 5 }}>
                  <span style={{ fontSize: 13, color: a.on ? "#1e293b" : "#94a3b8", fontWeight: 500 }}>{a.label}</span>
                  {a.isNew && <span style={{ fontSize: 9, fontWeight: 700, color: "#22c55e", backgroundColor: "#dcfce7", padding: "1px 5px", borderRadius: 3 }}>New</span>}
                </div>
                {/* Source tag */}
                {a.source && SOURCE_TAGS[a.source] && (
                  <span style={{ fontSize: 9, fontWeight: 600, color: SOURCE_TAGS[a.source].color, backgroundColor: SOURCE_TAGS[a.source].bg, padding: "1px 5px", borderRadius: 3, flexShrink: 0 }}>
                    {SOURCE_TAGS[a.source].label}
                  </span>
                )}
                {/* Icon preview */}
                <div style={{ width: 22, height: 22, borderRadius: 4, backgroundColor: "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {a.icon(13, "#94a3b8")}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{ padding: "12px 20px", borderTop: "1px solid #e5e7eb", display: "flex", justifyContent: "flex-end", gap: 8 }}>
        <Btn onClick={onClose}>Cancel</Btn>
        <Btn primary onClick={onClose}>Apply</Btn>
      </div>
    </div>
  );
};

        <div onClick={() => setShowCustomize(false)} style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.05)", zIndex: 15 }} />
        <CustomizeCard onClose={() => setShowCustomize(false)} />
      </>

  </div>
  );
};

    { id: "fields", label: "Details", icon: Ic.fields },

    { id: "tasks", label: "Tasks", icon: Ic.check, count: openTasks },
    { id: "notes", label: "Notes", icon: Ic.note, count: opp.notes.length },
    { id: "appts", label: "Appts", icon: Ic.cal, count: opp.appts.length + (opp.contactAppts || []).length },

    { id: "products", label: "Products", icon: Ic.pkg, count: (opp.products || []).length },

          </div>
          <div style={{ display: "flex", gap: 4, marginLeft: 12 }}>

          <Badge color={stage.color}>{stage.name}</Badge>
          {opp.status === "won" && <Badge color="#22c55e">Won</Badge>}

            <Av text={opp.ownerInit} size={22} color="#6366f1" />

        </div>
        {/* Stage bar with time labels */}
        <div style={{ display: "flex", gap: 3 }}>

              {panelTab === "activity" && (
                <div style={{ display: "flex", gap: 4 }}>

                  <Btn icon={Ic.phone(11)} sx={{ padding: "3px 8px", fontSize: 10 }}>Call</Btn>
                  <Btn icon={Ic.mail(11)} sx={{ padding: "3px 8px", fontSize: 10 }}>Email</Btn>

              {panelTab === "convos" && (
                <div style={{ display: "flex", gap: 4 }}>
                  <Btn icon={Ic.mail(11)} sx={{ padding: "3px 8px", fontSize: 10 }}>Email</Btn>
                  <Btn icon={Ic.sms(11)} sx={{ padding: "3px 8px", fontSize: 10 }}>SMS</Btn>

              )}
              {panelTab === "tasks" && <Btn primary icon={Ic.plus(11)} sx={{ padding: "3px 10px", fontSize: 11 }}>Add Task</Btn>}
              {panelTab === "notes" && <Btn primary icon={Ic.plus(11)} sx={{ padding: "3px 10px", fontSize: 11 }}>Add Note</Btn>}
              {panelTab === "appts" && <Btn primary icon={Ic.plus(11)} sx={{ padding: "3px 10px", fontSize: 11 }}>Book</Btn>}
            {panelTab === "docs" && <Btn primary icon={Ic.plus(11)} sx={{ padding: "3px 10px", fontSize: 11 }}>Upload</Btn>}
            {panelTab === "products" && <Btn primary icon={Ic.plus(11)} sx={{ padding: "3px 10px", fontSize: 11 }}>Add Product</Btn>}
            {panelTab === "assoc" && <Btn primary icon={Ic.plus(11)} sx={{ padding: "3px 10px", fontSize: 11 }}>Link</Btn>}
            </div>
            {/* Source filter */}
            {["activity", "convos", "tasks", "notes", "appts", "docs"].includes(panelTab) && (

                  display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 9px", borderRadius: 99, fontSize: 10, fontWeight: 600, cursor: "pointer", transition: "all 0.15s",
                  backgroundColor: panelHideContact ? "#8b5cf6" : "#fff",
                  color: panelHideContact ? "#fff" : "#64748b",
                  border: panelHideContact ? "1px solid #8b5cf6" : "1px solid #e5e7eb",

                  {panelHideContact ? Ic.check(9, "#fff") : null}

                </button>
              </div>
            )}
          </div>

          {/* Scrollable content */}
          <div style={{ flex: 1, overflowY: "auto", padding: panelTab === "fields" ? 0 : 14 }}>

            {/* Fields / Details */}
            {panelTab === "fields" && (
              <>
                {/* Owner */}
                <div style={{ padding: "14px 18px", borderBottom: "1px solid #f1f5f9" }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Owner</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <Av text={opp.ownerInit} size={26} color="#6366f1" />
                    <div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#1e293b" }}>{opp.owner}</div>
                      <div style={{ fontSize: 10, color: "#94a3b8" }}>Assigned owner</div>
                    </div>

                </div>

                <div style={{ borderBottom: "1px solid #f1f5f9" }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 18px 4px" }}>

                    <button onClick={() => setPanelTab("assoc")} style={{ fontSize: 10, color: "#3b82f6", background: "none", border: "none", cursor: "pointer", fontWeight: 700 }}>View all →</button>
                  </div>
                  {/* Company */}
                  <div style={{ padding: "4px 18px" }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", borderRadius: 8, backgroundColor: "#f8fafc", border: "1px solid #f1f5f9", cursor: "pointer" }}>
                      <div style={{ width: 26, height: 26, borderRadius: 6, backgroundColor: opp.company ? "#dbeafe" : "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>

                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, lineHeight: 1 }}>Company</div>
                        <div style={{ fontSize: 11, fontWeight: 600, color: opp.company ? "#1e293b" : "#94a3b8", marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                          {opp.company || "None linked"}
                        </div>
                      </div>
                    </div>
                  </div>
                  {/* Primary Contact */}
                  <div style={{ padding: "4px 18px 8px" }}>
                    {(() => {
                      const primary = opp.participants.find(p => p.primary);
                      return (
                        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 10px", borderRadius: 8, backgroundColor: "#f8fafc", border: "1px solid #f1f5f9", cursor: "pointer" }}>
                          {primary ? (
                            <Av text={primary.name.split(" ").map(n => n[0]).join("")} size={26} color="#3b82f6" />
                          ) : (
                            <div style={{ width: 26, height: 26, borderRadius: "50%", backgroundColor: "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center" }}>
                              {Ic.users(12, "#cbd5e1")}
                            </div>
                          )}

                            <div style={{ fontSize: 10, color: "#94a3b8", fontWeight: 600, lineHeight: 1 }}>Primary Contact</div>

                              {primary ? primary.name : "None linked"}

                            <span style={{ fontSize: 9, fontWeight: 700, color: "#64748b", backgroundColor: "#e5e7eb", borderRadius: 99, padding: "1px 6px" }}>+{opp.participants.length - 1}</span>

                      <div style={{ padding: "0 18px 10px" }}>

                          </div>

                      </div>
                    )}
                  </div>

                {/* Footer */}
                <div style={{ padding: "10px 18px", fontSize: 11, color: "#94a3b8" }}>
                  <div>Created: {opp.created || "Mar 20, 2026"}</div>

            {/* Activity */}
            {panelTab === "activity" && (() => {
              const isContactAct = (a) => a.source === "contact" || (!(a.links || []).some(l => l.self));
              const panelActivity = panelHideContact ? opp.activity.filter(a => !isContactAct(a)) : opp.activity;

              <>
                {panelActivity.slice(0, 8).map((a, i) => {
                  const meta = ACT[a.type] || { color: "#94a3b8", bg: "#f1f5f9" };

                    <div key={i} style={{ display: "flex", gap: 10 }}>
                      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", width: 24, flexShrink: 0 }}>

                          <div style={{ width: 8, height: 8, borderRadius: "50%", backgroundColor: meta.color }} />
                        </div>
                        {i < Math.min(panelActivity.length, 8) - 1 && <div style={{ width: 1, flex: 1, backgroundColor: "#f1f5f9", minHeight: 10 }} />}
                      </div>
                      <div style={{ flex: 1, paddingBottom: 14, minWidth: 0 }}>
                        <div style={{ fontSize: 12, fontWeight: 600, color: "#1e293b", lineHeight: 1.3 }}>{a.label}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>{a.time} · {a.user}</div>
                      </div>
                    </div>
                  );
                })}
                {panelActivity.length > 8 && (
                  <button onClick={onExpand} style={{ width: "100%", padding: "8px 0", border: "none", backgroundColor: "transparent", color: "#3b82f6", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>
                    View all {panelActivity.length} activities →
                  </button>
                )}
                {panelActivity.length === 0 && <Empty text={panelHideContact ? "No opp-specific activity" : "No activity yet"} />}
              </>
            );
            })()}

            {/* Conversations */}
            {panelTab === "convos" && (() => {
              const convos = (opp.conversations || []).filter(cv => !panelHideContact || cv.source !== "contact");
              return (
              <>
                {convos.map(cv => {
                  const chColor = cv.channel === "email" ? "#3b82f6" : cv.channel === "sms" ? "#06b6d4" : "#22c55e";
                  const chLabel = cv.channel === "email" ? "Email" : cv.channel === "sms" ? "SMS" : "WhatsApp";
                  const isContact = cv.source === "contact";
                  return (
                    <div key={cv.id} style={{ padding: "12px 14px", borderRadius: 8, border: cv.unread ? "1px solid " + chColor + "44" : "1px solid #f1f5f9", marginBottom: 8, backgroundColor: cv.unread ? chColor + "06" : isContact ? "#fafbfc" : "#fff", cursor: "pointer", transition: "all 0.15s" }}
                      onMouseEnter={e => e.currentTarget.style.boxShadow = "0 2px 8px rgba(0,0,0,0.06)"}
                      onMouseLeave={e => e.currentTarget.style.boxShadow = "none"}
                    >
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                          {cv.channel === "email" ? Ic.mail(13, chColor) : Ic.sms(13, chColor)}
                          <span style={{ fontSize: 10, fontWeight: 700, color: chColor, textTransform: "uppercase", letterSpacing: 0.3 }}>{chLabel}</span>
                        </div>
                        {isContact && <span style={{ fontSize: 9, fontWeight: 600, color: "#3b82f6", backgroundColor: "#dbeafe", padding: "1px 5px", borderRadius: 3 }}>{cv.contact}</span>}
                        <span style={{ fontSize: 11, color: "#94a3b8", marginLeft: "auto" }}>{cv.time}</span>
                        {cv.unread && <div style={{ width: 7, height: 7, borderRadius: "50%", backgroundColor: chColor, flexShrink: 0 }} />}
                      </div>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#1e293b", marginBottom: 2 }}>{cv.contact}{cv.subject ? ` — ${cv.subject}` : ""}</div>
                      <div style={{ fontSize: 11, color: "#64748b", lineHeight: 1.4, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{cv.lastMsg}</div>
                    </div>
                  );
                })}
                {convos.length === 0 && <Empty text={panelHideContact ? "No opp-specific conversations" : "No conversations linked"} />}
              </>
            );
            })()}

            {/* Tasks */}
            {panelTab === "tasks" && (() => {
              const tasks = opp.tasks.filter(t => !panelHideContact || t.source !== "contact");
              return (
              <>
                {tasks.map(t => (
                  <div key={t.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, opacity: t.done ? 0.5 : 1, backgroundColor: t.source === "contact" ? "#fafbfc" : "#fff" }}>
                    <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                      <div style={{ width: 18, height: 18, borderRadius: 5, border: t.done ? "none" : "2px solid #d1d5db", backgroundColor: t.done ? "#22c55e" : "transparent", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, marginTop: 1 }}>{t.done && Ic.check(10, "#fff")}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", textDecoration: t.done ? "line-through" : "none", lineHeight: 1.3 }}>{t.title}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 4, display: "flex", alignItems: "center", gap: 8 }}>
                          <span>Due {t.due}</span>
                          <Badge color={t.priority === "high" ? "#dc2626" : t.priority === "med" ? "#f59e0b" : "#22c55e"}>{t.priority}</Badge>
                          {t.source === "contact" && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: "#3b82f6", fontWeight: 600 }}><span style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#3b82f6", display: "inline-block" }} />{t.contact}</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
                {tasks.length === 0 && <Empty text={panelHideContact ? "No opp-specific tasks" : "No tasks yet"} />}
              </>
            );
            })()}

            {/* Notes */}
            {panelTab === "notes" && (() => {
              const notes = opp.notes.filter(n => !panelHideContact || n.source !== "contact");
              return (
              <>
                {notes.map(n => (
                  <div key={n.id} style={{ padding: "12px 14px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: n.source === "contact" ? "#fafbfc" : "#fff" }}>
                    <div style={{ fontSize: 13, color: "#334155", lineHeight: 1.5 }}>{n.text}</div>
                    <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 5, display: "flex", alignItems: "center", gap: 6 }}>
                      <span>{n.by} · {n.time}</span>
                      {n.source === "contact" && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: "#3b82f6", fontWeight: 600 }}><span style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#3b82f6", display: "inline-block" }} />{n.contact}</span>}
                    </div>
                  </div>
                ))}
                {notes.length === 0 && <Empty text={panelHideContact ? "No opp-specific notes" : "No notes yet"} />}
              </>
            );
            })()}

            {/* Appointments — dual source */}
            {panelTab === "appts" && (
              <>
                {opp.appts.length > 0 && (
                  <div style={{ marginBottom: 10 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Opportunity Appointments</div>
                    {opp.appts.map(a => (
                      <div key={a.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #dbeafe", marginBottom: 8, backgroundColor: "#fff" }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", marginBottom: 3 }}>{a.title}</div>
                        <div style={{ fontSize: 12, color: "#64748b" }}>{a.date}</div>
                        <div style={{ fontSize: 11, color: "#94a3b8", marginTop: 2 }}>With: {a.with}</div>
                      </div>
                    ))}
                  </div>
                )}
                {!panelHideContact && (opp.contactAppts || []).length > 0 && (
                  <div>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8, display: "flex", alignItems: "center", gap: 6 }}>
                      From Contacts
                      <span style={{ fontSize: 9, fontWeight: 600, color: "#3b82f6", backgroundColor: "#dbeafe", padding: "1px 5px", borderRadius: 3 }}>inherited</span>
                    </div>
                    {opp.contactAppts.map(a => (
                      <div key={a.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: "#fafbfc", opacity: 0.7 }}>
                        <div style={{ fontSize: 13, fontWeight: 600, color: "#475569" }}>{a.title}</div>
                        <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 2 }}>{a.date}</div>
                        <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>from {a.contact}</div>
                      </div>
                    ))}
                  </div>
                )}
                {opp.appts.length === 0 && (!opp.contactAppts || opp.contactAppts.length === 0 || panelHideContact) && opp.appts.length === 0 && <Empty text={panelHideContact ? "No opp-specific appointments" : "No appointments"} />}
              </>
            )}

            {/* Documents */}
            {panelTab === "docs" && (() => {
              const docs = opp.docs.filter(d => !panelHideContact || d.source !== "contact");
              return (
              <>
                {docs.map(d => (
                  <div key={d.id} style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: d.source === "contact" ? "#fafbfc" : "#fff" }}>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 4 }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{d.name}</span>
                      <Badge color={d.status === "Signed" ? "#22c55e" : d.status === "Viewed" ? "#3b82f6" : "#94a3b8"}>{d.status}</Badge>
                    </div>
                    <div style={{ fontSize: 11, color: "#94a3b8", display: "flex", alignItems: "center", gap: 6 }}>
                      <span>{d.type} · {d.to} · {d.date}</span>
                      {d.source === "contact" && <span style={{ display: "inline-flex", alignItems: "center", gap: 3, fontSize: 10, color: "#3b82f6", fontWeight: 600 }}><span style={{ width: 4, height: 4, borderRadius: "50%", backgroundColor: "#3b82f6", display: "inline-block" }} />{d.contact}</span>}
                    </div>
                  </div>
                ))}
                {docs.length === 0 && <Empty text={panelHideContact ? "No opp-specific documents" : "No documents yet"} />}
              </>
            );
            })()}

            {/* Products */}
            {panelTab === "products" && (
              <>
                {(opp.products || []).map((p, i) => (
                  <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "12px 14px", borderRadius: 8, border: "1px solid #f1f5f9", marginBottom: 8, backgroundColor: "#fff" }}>
                    <div>
                      <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{p.name}</div>
                      <div style={{ fontSize: 11, color: "#94a3b8" }}>Qty: {p.qty}</div>
                    </div>
                    <span style={{ fontSize: 14, fontWeight: 700, color: "#1e293b" }}>{fmt(p.price)}</span>
                  </div>
                ))}
                {opp.products && opp.products.length > 0 && (
                  <div style={{ display: "flex", justifyContent: "space-between", padding: "10px 14px", borderTop: "2px solid #3b82f6", marginTop: 4 }}>
                    <span style={{ fontSize: 13, fontWeight: 800, color: "#1e293b" }}>Total</span>
                    <span style={{ fontSize: 15, fontWeight: 800, color: "#3b82f6" }}>{fmt(opp.products.reduce((s, p) => s + p.price * p.qty, 0))}</span>
                  </div>
                )}
                {(!opp.products || opp.products.length === 0) && <Empty text="No products yet" />}
              </>
            )}

            {/* Associations */}
            {panelTab === "assoc" && (
              <>
                {/* Company */}
                <div style={{ marginBottom: 14 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Company</div>
                  {opp.company ? (
                    <div style={{ padding: "10px 12px", borderRadius: 8, border: "1px solid #f1f5f9", backgroundColor: "#fff", display: "flex", alignItems: "center", gap: 10 }}>
                      <div style={{ width: 32, height: 32, borderRadius: 6, backgroundColor: "#dbeafe", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{Ic.bldg(15, "#3b82f6")}</div>
                      <span style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{opp.company}</span>
                    </div>
                  ) : (
                    <button style={{ width: "100%", fontSize: 11, color: "#3b82f6", background: "none", border: "1px dashed #bfdbfe", borderRadius: 8, cursor: "pointer", fontWeight: 600, padding: "12px" }}>+ Link company</button>
                  )}
                </div>
                {/* Contacts */}
                <div>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5 }}>Contacts ({opp.participants.length})</div>
                    <button style={{ fontSize: 10, color: "#3b82f6", background: "none", border: "none", cursor: "pointer", fontWeight: 700 }}>+ Add</button>
                  </div>
                  {opp.participants.map((p, i) => (
                    <div key={i} style={{ padding: "10px 12px", borderRadius: 10, border: "1px solid #f1f5f9", backgroundColor: "#fff", marginBottom: 8 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 8 }}>
                        <Av text={p.name.split(" ").map(n => n[0]).join("")} size={32} color={p.primary ? "#3b82f6" : "#94a3b8"} />
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b", display: "flex", alignItems: "center", gap: 4 }}>{p.name} {p.primary && <Badge color="#3b82f6">Primary</Badge>}</div>
                          <div style={{ fontSize: 11, color: "#94a3b8" }}>{p.role} · {p.email}</div>
                        </div>
                      </div>
                      {/* Contact Tags — editable */}
                      <div style={{ paddingLeft: 42 }}>
                        <div style={{ display: "flex", gap: 4, flexWrap: "wrap", alignItems: "center" }}>
                          {(p.contactTags || []).map((tag, ti) => (
                            <span key={ti} style={{ display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 8px", borderRadius: 99, fontSize: 10, fontWeight: 600, backgroundColor: "#ede9fe", color: "#7c3aed", lineHeight: "16px", cursor: "default" }}>
                              {tag}
                              <button style={{ background: "none", border: "none", padding: 0, cursor: "pointer", display: "flex", color: "#7c3aed", opacity: 0.5 }} title={`Remove "${tag}"`}>{Ic.x(10, "#7c3aed")}</button>
                            </span>
                          ))}
                          <button style={{ display: "inline-flex", alignItems: "center", gap: 2, padding: "2px 8px", borderRadius: 99, fontSize: 10, fontWeight: 600, backgroundColor: "#f8fafc", color: "#94a3b8", border: "1px dashed #e2e8f0", cursor: "pointer", lineHeight: "16px" }}>
                            {Ic.plus(9, "#94a3b8")} tag
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                  {opp.participants.length === 0 && <div style={{ fontSize: 12, color: "#94a3b8", fontStyle: "italic" }}>No contacts linked</div>}
                </div>
              </>
            )}
          </div>
        </div>

        {/* Icon rail — same pattern as Workspace right panel */}
        <div style={{ width: 44, backgroundColor: "#fafbfc", borderLeft: "1px solid #f1f5f9", display: "flex", flexDirection: "column", alignItems: "center", paddingTop: 12, gap: 4, flexShrink: 0 }}>
          {panelTabs.map(t => (
            <div key={t.id} onClick={() => setPanelTab(t.id)} title={t.label} style={{
              width: 34, height: 34, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "pointer", transition: "all 0.15s", position: "relative",
              backgroundColor: panelTab === t.id ? "#eff6ff" : "transparent",
            }}
              onMouseEnter={e => { if (panelTab !== t.id) e.currentTarget.style.backgroundColor = "#f1f5f9"; }}
              onMouseLeave={e => { if (panelTab !== t.id) e.currentTarget.style.backgroundColor = "transparent"; }}
            >
              {t.icon(17, panelTab === t.id ? "#3b82f6" : "#94a3b8")}
              {t.count > 0 && (
                <div style={{ position: "absolute", top: 2, right: 2, width: 14, height: 14, borderRadius: "50%", backgroundColor: panelTab === t.id ? "#3b82f6" : "#cbd5e1", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <span style={{ fontSize: 8, fontWeight: 700, color: "#fff" }}>{t.count > 9 ? "9+" : t.count}</span>
                </div>
              )}
            </div>
          ))}
        </div>
      </div>

      {/* Footer */}
      <div style={{ padding: "12px 18px", borderTop: "1px solid #e5e7eb", display: "flex", gap: 8, backgroundColor: "#fafbfc" }}>
        <Btn primary icon={Ic.expand(13)} onClick={onExpand} sx={{ flex: 1, justifyContent: "center", padding: "8px 16px", fontSize: 13, borderRadius: 10 }}>Open Full Workspace</Btn>
      </div>
    </div>
  );
};

// ============================================================
// FULL WORKSPACE — 3-column, Contact Details page pattern
// ============================================================
const Workspace = ({ opp, onBack }) => {
  const [rp, setRp] = useState("tasks");
  const [collapsed, setCollapsed] = useState({});
  const [actFilters, setActFilters] = useState([]); // empty = all; array of category ids for multi-select
  const [showFilters, setShowFilters] = useState(false);
  const [hideContact, setHideContact] = useState(false); // source filter: hide contact-inherited items
  const [composer, setComposer] = useState(null);
  const [pickerFor, setPickerFor] = useState(null);
  const [expandedLinks, setExpandedLinks] = useState(null); // index of activity with expanded links
  const [linkEditor, setLinkEditor] = useState(null); // index of activity being edited for links
  const stage = STAGES.find(s => s.id === opp.stageId);
  const toggle = k => setCollapsed(p => ({ ...p, [k]: !p[k] }));

  const rpanels = [
    { id: "convos", icon: Ic.sms, tip: "Conversations" },
    { id: "tasks", icon: Ic.check, tip: "Tasks" },
    { id: "notes", icon: Ic.note, tip: "Notes" },
    { id: "payments", icon: Ic.dollar, tip: "Payments" },
    { id: "appts", icon: Ic.cal, tip: "Appointments" },
    { id: "products", icon: Ic.pkg, tip: "Products" },
    { id: "assoc", icon: Ic.link, tip: "Associations" },
  ];

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "100%", backgroundColor: "#f8fafc" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 24px", backgroundColor: "#fff", borderBottom: "1px solid #e5e7eb", boxShadow: "0 1px 3px rgba(0,0,0,0.03)" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14 }}>
          <button onClick={onBack} style={{ width: 34, height: 34, borderRadius: 8, border: "1px solid #e2e8f0", backgroundColor: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", transition: "all 0.15s" }}
            onMouseEnter={e => e.currentTarget.style.backgroundColor = "#f8fafc"}
            onMouseLeave={e => e.currentTarget.style.backgroundColor = "#fff"}
          >{Ic.back(15)}</button>
          <div>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", letterSpacing: 0.8, textTransform: "uppercase", marginBottom: 1 }}>Opportunity</div>
            <h2 style={{ margin: 0, fontSize: 18, fontWeight: 800, color: "#0f172a", letterSpacing: -0.3 }}>{opp.name}</h2>
          </div>
        </div>

        {/* Stage inline */}
        <div style={{ display: "flex", alignItems: "center", gap: 10, flex: 1, maxWidth: 480, margin: "0 36px" }}>
          {STAGES.map((s, i) => {
            const ci = STAGES.findIndex(x => x.id === opp.stageId);
            const active = s.id === opp.stageId;
            const done = i < ci;
            const sh = (opp.stageHistory || []).find(h => h.stageId === s.id);
            return (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 6, flex: 1 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                  <div style={{ width: 22, height: 22, borderRadius: "50%", backgroundColor: active ? s.color : done ? s.color + "30" : "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.2s", boxShadow: active ? `0 0 0 3px ${s.color}25` : "none" }}>
                    {(active || done) && Ic.check(11, active ? "#fff" : s.color)}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", whiteSpace: "nowrap" }}>
                    <span style={{ fontSize: 10, fontWeight: active ? 800 : 500, color: active ? s.color : done ? "#64748b" : "#cbd5e1", letterSpacing: 0.1, lineHeight: 1.2 }}>{s.name}</span>
                    {sh && <span style={{ fontSize: 9, fontWeight: 600, color: active ? s.color + "aa" : done ? "#94a3b8" : "#cbd5e1", lineHeight: 1.2 }}>{sh.days}d</span>}
                  </div>
                </div>
                {i < STAGES.length - 1 && <div style={{ flex: 1, height: 2, borderRadius: 1, backgroundColor: done ? s.color + "40" : "#e5e7eb", minWidth: 8 }} />}
              </div>
            );
          })}
        </div>

        <div style={{ display: "flex", gap: 8 }}>
          <Btn sx={{ backgroundColor: "#fef2f2", color: "#dc2626", border: "1px solid #fecaca", fontWeight: 700 }}>Lost</Btn>
          <Btn sx={{ backgroundColor: "#f0fdf4", color: "#16a34a", border: "1px solid #bbf7d0", fontWeight: 700 }}>Won</Btn>
          <IcBtn icon={Ic.dots(16)} title="More" />
        </div>
      </div>

      {/* 3-column body */}
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>

        {/* ====== LEFT: Field Editor ====== */}
        <div style={{ width: 320, backgroundColor: "#fff", borderRight: "1px solid #e5e7eb", overflowY: "auto", flexShrink: 0 }}>
          {/* Owner */}
          <div style={{ padding: "16px 20px", borderBottom: "1px solid #f1f5f9" }}>
            <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 8 }}>Owner</div>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <Av text={opp.ownerInit} size={28} color="#6366f1" />
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: "#1e293b" }}>{opp.owner}</div>
                <div style={{ fontSize: 11, color: "#94a3b8" }}>Assigned owner</div>
              </div>
            </div>
          </div>

          {/* Associations — labeled rows, clickable, with add action */}
          <div style={{ borderBottom: "1px solid #f1f5f9" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 20px 6px" }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: "#94a3b8", textTransform: "uppercase", letterSpacing: 0.5 }}>Associations</div>
              <button onClick={() => setRp("assoc")} style={{ fontSize: 10, color: "#3b82f6", background: "none", border: "none", cursor: "pointer", fontWeight: 700 }}>View all →</button>
            </div>

            {/* Company row */}
            <div style={{ padding: "6px 20px" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, backgroundColor: "#f8fafc", cursor: "pointer", border: "1px solid #f1f5f9" }}>
                <div style={{ width: 28, height: 28, borderRadius: 6, backgroundColor: opp.company ? "#dbeafe" : "#f1f5f9", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
                  {Ic.bldg(13, opp.company ? "#3b82f6" : "#cbd5e1")}
                </div>
                <div style={{ flex: 1, minWidth: 0 }}>

                      onMouseLeave={e => { e.currentTarget.style.backgroundColor = "transparent"; e.currentTarget.querySelector('.ws-edit-icon').style.opacity = 0; }}

                      </div>
                    </div>

                </div>
              )}
            </div>

          <div style={{ padding: "14px 20px", fontSize: 11, color: "#94a3b8" }}>
            <div>Created: {opp.created || "Mar 20, 2026"}</div>

          </div>
        </div>

              <span style={{ fontSize: 11, fontWeight: 600, color: "#94a3b8", backgroundColor: "#f1f5f9", borderRadius: 99, padding: "1px 7px" }}>{opp.activity.length}</span>

                <div style={{ display: "flex", alignItems: "center", gap: 4, padding: "3px 10px", borderRadius: 99, backgroundColor: "#eff6ff", border: "1px solid #bfdbfe" }}>

                  if (opp.participants.length === 0) setPickerFor("call");
                  else if (opp.participants.length === 1) setComposer({ type: "call", contact: opp.participants[0] });
                  else setPickerFor("call");
                }}>Log Call</Btn>
                {pickerFor === "call" && <ContactPicker contacts={opp.participants} onSelect={c => { setComposer({ type: "call", contact: c }); setPickerFor(null); }} onClose={() => setPickerFor(null)} />}
              </div>
              <div style={{ position: "relative" }}>
                <Btn icon={Ic.mail(13)} onClick={() => {
                  if (opp.participants.length === 0) setPickerFor("email");
                  else if (opp.participants.length === 1) setComposer({ type: "email", contact: opp.participants[0] });
                  else setPickerFor("email");
                }}>Email</Btn>
                {pickerFor === "email" && <ContactPicker contacts={opp.participants} onSelect={c => { setComposer({ type: "email", contact: c }); setPickerFor(null); }} onClose={() => setPickerFor(null)} />}
              </div>
              <div style={{ position: "relative" }}>
                <Btn icon={Ic.sms(13)} onClick={() => {
                  if (opp.participants.length === 0) setPickerFor("sms");
                  else if (opp.participants.length === 1) setComposer({ type: "sms", contact: opp.participants[0] });
                  else setPickerFor("sms");
                }}>SMS</Btn>
                {pickerFor === "sms" && <ContactPicker contacts={opp.participants} onSelect={c => { setComposer({ type: "sms", contact: c }); setPickerFor(null); }} onClose={() => setPickerFor(null)} />}
              </div>
              <div style={{ position: "relative" }}>
                <Btn icon={Ic.cal(13)} onClick={() => {
                  if (opp.participants.length === 0) setPickerFor("appt");

                const isActive = actFilters.includes(f.id);
                return (
                  <button key={f.id} onClick={() => setActFilters(prev => isActive ? prev.filter(x => x !== f.id) : [...prev, f.id])} style={{

                    backgroundColor: isActive ? "#3b82f6" : "#fff",
                    color: isActive ? "#fff" : "#64748b",
                    border: isActive ? "1px solid #3b82f6" : "1px solid #e5e7eb",

              if (hideContact) filtered = filtered.filter(a => !isContactActivity(a));
              const getIcon = (type) => {
                const s = 14;
                const c = ACT[type]?.color || "#94a3b8";
                switch(type) {
                  case "email_out": return Ic.send(s, c);
                  case "email_in": return Ic.inbox(s, c);
                  case "sms_out": return Ic.sms(s, c);
                  case "sms_in": return Ic.sms(s, c);
                  case "call": return Ic.phone(s, c);
                  case "note": return Ic.note(s, c);
                  case "stage": return Ic.activity(s, c);
                  case "task": return Ic.check(s, c);
                  case "form": return Ic.form(s, c);
                  case "payment": return Ic.dollar(s, c);
                  case "estimate": return Ic.file(s, c);
                  case "invoice": return Ic.dollar(s, c);
                  case "appointment": return Ic.cal(s, c);
                  case "appointment_scheduled": return Ic.cal(s, c);
                  case "contact": return Ic.users(s, c);
                  case "workflow": return Ic.zap(s, c);
                  case "field": return Ic.edit(s, c);
                  case "document": return Ic.file(s, c);
                  case "created": return Ic.plus(s, c);
                  default: return Ic.activity(s, c);
                }
              };
              return filtered.length > 0 ? filtered.map((a, i) => {

                            onMouseEnter={e => e.currentTarget.style.opacity = 1}
                            onMouseLeave={e => { if (linkEditor !== i) e.currentTarget.style.opacity = 0.5; }}
                          >{Ic.link(12)}</button>
                          <span style={{ fontSize: 11, color: "#94a3b8" }}>{a.time}</span>
                        </div>
                      </div>
                      <div style={{ fontSize: 13, color: "#64748b", lineHeight: 1.5 }}>{a.detail}</div>
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 5, flexWrap: "wrap" }}>

                        {a.links && (() => {
                          const otherLinks = a.links.filter(l => !l.self);

                          const linkColors = { contact: "#3b82f6", opp: "#8b5cf6", company: "#f59e0b", custom: "#14b8a6" };
                          const linkIcons = { contact: Ic.users, opp: Ic.activity, company: Ic.bldg, custom: Ic.link };
                          const MAX_SHOW = 3;
                          const visible = otherLinks.slice(0, expandedLinks === i ? otherLinks.length : MAX_SHOW);
                          const overflow = otherLinks.length - MAX_SHOW;
                          return (
                            <>
                              <span style={{ fontSize: 11, color: "#cbd5e1" }}>·</span>
                              {Ic.link(10, "#cbd5e1")}

                                  border: `1px solid ${(linkColors[l.type] || "#94a3b8")}25`,
                                }}>
                                  {(linkIcons[l.type] || Ic.link)(9, linkColors[l.type] || "#94a3b8")}
                                  {l.name}
                                </span>

                              {overflow > 0 && expandedLinks !== i && (
                                <button onClick={() => setExpandedLinks(i)} style={{
                                  display: "inline-flex", alignItems: "center", fontSize: 10, fontWeight: 700,
                                  padding: "2px 7px", borderRadius: 4, cursor: "pointer",
                                  backgroundColor: "#f1f5f9", color: "#64748b", border: "1px solid #e5e7eb",
                                }}>+{overflow} more</button>

                                  display: "inline-flex", alignItems: "center", fontSize: 10, fontWeight: 700,
                                  padding: "2px 7px", borderRadius: 4, cursor: "pointer",
                                  backgroundColor: "#f1f5f9", color: "#64748b", border: "1px solid #e5e7eb",
                                }}>show less</button>
                              )}
                            </>
                          );
                        })()}
                      </div>

                        <div style={{ position: "relative", marginTop: 6 }}>

                            existingLinks={a.links || []}
                            onLink={(r) => { setLinkEditor(null); }}
                            onClose={() => setLinkEditor(null)}
                          />
                        </div>
                      )}
                    </div>
                  </div>
                );
              }) : (
                <div style={{ textAlign: "center", padding: "40px 0" }}>
                  <div style={{ fontSize: 13, color: "#94a3b8" }}>No {actFilters.map(id => ACT_FILTERS.find(f => f.id === id)?.label?.toLowerCase()).join(" or ")} activity yet</div>

            })()}

              <div style={{ textAlign: "center", padding: "60px 0" }}>
                <div style={{ fontSize: 14, fontWeight: 600, color: "#475569", marginBottom: 4 }}>No activity yet</div>

              </div>

          </div>

          {composer && <Composer type={composer.type} contact={composer.contact} onClose={() => setComposer(null)} oppName={opp.name} />}

                    color: hideContact ? "#fff" : "#64748b",
                    border: hideContact ? "1px solid #8b5cf6" : "1px solid #e5e7eb",

                    {hideContact ? Ic.check(10, "#fff") : null}
                    This opp only
                  </button>
                </div>
              )}
            </div>

            {/* Panel content */}
            <div style={{ flex: 1, overflowY: "auto", padding: 14 }}>
              {rp === "convos" && (() => {
                const convos = (opp.conversations || []).filter(cv => !hideContact || cv.source !== "contact");
